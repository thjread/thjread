services:
  db:
    image: postgres:17-alpine
    environment:
      # no password within the private compose network, matching the
      # DATABASE_URL the backend and backup containers use
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
     - db-data-pg17:/var/lib/postgresql/data
    restart: always

  rust:
    image: gcr.io/crypto-isotope-229419/reminders-rust
    restart: always
    depends_on:
     - db

  nginx:
    # no published ports: all ingress comes through the cloudflared tunnel
    image: gcr.io/crypto-isotope-229419/reminders-nginx
    restart: always

  backup:
    image: gcr.io/crypto-isotope-229419/reminders-backup
    restart: always
    depends_on:
      - db

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      # set in an untracked .env file next to this compose file on the VM
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    restart: always
    depends_on:
      - nginx

volumes:
  # pg17 gets a fresh volume; data is restored from the S3 backup at
  # migration time (see ProdInstructions). The old pg12 volume db-data
  # is left untouched until the migration is confirmed good.
  db-data-pg17:
    driver: local
