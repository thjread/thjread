# All ingress arrives from cloudflared over the compose network; TLS
# terminates at the Cloudflare edge and the tunnel link is encrypted.
server {
    listen 8081;

    include /etc/nginx/server_name_main.conf;

    add_header Strict-Transport-Security "max-age=31536000" always;
    root /usr/share/nginx/html/main;

    location /pdfs {
        include /etc/nginx/pdf-security-headers.conf;
        expires 1d;
    }

    location = /index.html {
        include /etc/nginx/wasm-security-headers.conf;
        expires 1d;
    }

    location = /favicon.ico {
        include /etc/nginx/wasm-security-headers.conf;
        expires 7d;
    }

    location / {
        include /etc/nginx/wasm-security-headers.conf;
        index index.html;
        expires max;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
    }

    location = /50x.html {
        internal;
    }
}


server {
    listen 8081;

    include /etc/nginx/server_name_reminders.conf;

    add_header Strict-Transport-Security "max-age=31536000" always;
    root /usr/share/nginx/html/reminders;

    location /api {
        include /etc/nginx/api-security-headers.conf;
        proxy_pass http://docker-rust;
    }

    location = /index.html {
        include /etc/nginx/security-headers.conf;
        expires -1;
    }

    location = /sw.js {
        include /etc/nginx/security-headers.conf;
        expires -1;
    }

    location = /manifest.json {
        include /etc/nginx/security-headers.conf;
        expires -1;
    }

    location /images {
        include /etc/nginx/security-headers.conf;
        expires 1d;
    }

    location = /favicon.ico {
        include /etc/nginx/security-headers.conf;
        expires 1d;
    }

    location / {
        include /etc/nginx/security-headers.conf;
        index index.html;
        expires max;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
    }

    location = /50x.html {
        internal;
    }
}
